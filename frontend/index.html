<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0C0F1A">
  <title>RackPilot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.33.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>

<!-- Login modal (shown before auth) -->
<div id="loginModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-logo">
      <div class="logo-mark"><i class="ti ti-radio-tower"></i></div>
      <div>
        <div class="logo-name">RackPilot</div>
        <div class="logo-sub">by Valeronix</div>
      </div>
    </div>
    <form id="loginForm" autocomplete="on">
      <div class="field-group">
        <label class="field-label" for="loginEmail">Email</label>
        <input class="field-input" type="email" id="loginEmail" name="email" placeholder="you@company.com" autocomplete="email" required>
      </div>
      <div class="field-group">
        <label class="field-label" for="loginPassword">Password</label>
        <input class="field-input" type="password" id="loginPassword" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div id="loginError" class="field-error" style="display:none"></div>
      <div id="mfaField" class="field-group" style="display:none">
        <label class="field-label" for="loginMfa">Authenticator code</label>
        <input class="field-input field-input--center" type="text" id="loginMfa" name="mfa" placeholder="000 000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
      </div>
      <button type="submit" class="btn btn--primary btn--full">Sign in</button>
    </form>
    <div class="login-dev-divider">
      <span>или</span>
    </div>
    <button type="button" id="devLoginBtn" class="btn btn--dev btn--full">
      <i class="ti ti-bolt"></i> Войти без пароля (dev)
    </button>
  </div>
</div>

<!-- App shell -->
<div id="app" class="app" style="display:none">

  <!-- ── Desktop sidebar (hidden on mobile) ──────────────────────────── -->
  <nav class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="sidebar-logo">
      <div class="logo-mark"><i class="ti ti-radio-tower"></i></div>
      <div>
        <div class="logo-name">RackPilot</div>
        <div class="logo-sub">by Valeronix</div>
      </div>
    </div>

    <div class="sidebar-nav" role="list">
      <a class="nav-item" href="#overview" data-route-link="overview" role="listitem">
        <i class="ti ti-layout-dashboard" aria-hidden="true"></i>
        <span>Overview</span>
      </a>
      <a class="nav-item" href="#projects" data-route-link="projects" role="listitem">
        <i class="ti ti-briefcase" aria-hidden="true"></i>
        <span>Projects</span>
        <span class="nav-badge" id="badge-projects"></span>
      </a>
      <a class="nav-item" href="#inventory" data-route-link="inventory" role="listitem">
        <i class="ti ti-packages" aria-hidden="true"></i>
        <span>Inventory</span>
        <span class="nav-badge nav-badge--warn" id="badge-inventory"></span>
      </a>
      <a class="nav-item" href="#work-orders" data-route-link="work-orders" role="listitem">
        <i class="ti ti-clipboard-list" aria-hidden="true"></i>
        <span>Work orders</span>
        <span class="nav-badge nav-badge--warn" id="badge-workorders"></span>
      </a>
      <a class="nav-item" href="#tech" data-route-link="tech" role="listitem">
        <i class="ti ti-map-pin" aria-hidden="true"></i>
        <span>Field</span>
      </a>
      <a class="nav-item" href="#logs" data-route-link="logs" role="listitem">
        <i class="ti ti-history" aria-hidden="true"></i>
        <span>Logs</span>
      </a>
      <a class="nav-item" href="#wiki" data-route-link="wiki" role="listitem">
        <i class="ti ti-notebook" aria-hidden="true"></i>
        <span>Wiki</span>
      </a>
      <a class="nav-item" href="#diagrams" data-route-link="diagrams" role="listitem">
        <i class="ti ti-schema" aria-hidden="true"></i>
        <span>Схемы</span>
      </a>
      <a class="nav-item" href="#docs" data-route-link="docs" role="listitem">
        <i class="ti ti-book-2" aria-hidden="true"></i>
        <span>Docs</span>
      </a>
      <a class="nav-item" href="#api" data-route-link="api" role="listitem">
        <i class="ti ti-activity" aria-hidden="true"></i>
        <span>API Monitor</span>
      </a>
      <a class="nav-item" href="#transport" data-route-link="transport" role="listitem">
        <i class="ti ti-truck" aria-hidden="true"></i>
        <span>Транспорт</span>
      </a>
      <a class="nav-item" href="#admin" data-route-link="admin" role="listitem">
        <i class="ti ti-settings" aria-hidden="true"></i>
        <span>Admin</span>
      </a>
    </div>

    <!-- System stats widget -->
    <div class="sys-widget" id="sysWidget" title="Мониторинг системы">
      <div class="sys-row">
        <span class="sys-label"><i class="ti ti-cpu"></i></span>
        <div class="sys-bar-wrap"><div class="sys-bar" id="sw-cpu-bar"></div></div>
        <span class="sys-val" id="sw-cpu">—</span>
      </div>
      <div class="sys-row">
        <span class="sys-label"><i class="ti ti-database"></i></span>
        <div class="sys-bar-wrap"><div class="sys-bar" id="sw-mem-bar"></div></div>
        <span class="sys-val" id="sw-mem">—</span>
      </div>
      <div class="sys-row sys-row--bat">
        <span class="sys-label" id="sw-bat-icon"><i class="ti ti-battery-2"></i></span>
        <div class="sys-bar-wrap"><div class="sys-bar sys-bar--bat" id="sw-bat-bar"></div></div>
        <span class="sys-val" id="sw-bat">—</span>
        <span class="sys-volt" id="sw-volt"></span>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="user-chip" id="userChip" aria-label="User menu">
        <div class="avatar" id="sidebarAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sidebarName">—</div>
          <div class="user-role" id="sidebarRole">—</div>
        </div>
        <i class="ti ti-dots-vertical" aria-hidden="true"></i>
      </div>
    </div>
  </nav>

  <!-- ── Main content area ───────────────────────────────────────────── -->
  <div class="main-wrap">

    <!-- Desktop topbar -->
    <header class="topbar" id="topbar">
      <div class="topbar-breadcrumb" id="topbarBreadcrumb">
        <span>Overview</span>
      </div>
      <div class="topbar-right">
        <button class="search-trigger" id="searchTrigger" aria-label="Search (⌘K)">
          <i class="ti ti-search" aria-hidden="true"></i>
          <span class="search-hint">Search</span>
          <kbd>⌘K</kbd>
        </button>
        <button class="icon-btn" id="notifBtn" aria-label="Notifications">
          <i class="ti ti-bell" aria-hidden="true"></i>
          <span class="notif-dot" id="notifDot" style="display:none"></span>
        </button>
        <button class="icon-btn mobile-only" id="mobileMenuBtn" aria-label="Menu">
          <i class="ti ti-menu-2" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <!-- Page views (one per route) -->
    <main class="content" id="mainContent" role="main">
      <div data-view="overview" class="view"></div>
      <div data-view="projects" class="view"></div>
      <div data-view="inventory" class="view"></div>
      <div data-view="work-orders" class="view"></div>
      <div data-view="transport" class="view"></div>
      <div data-view="tech" class="view"></div>
      <div data-view="logs" class="view"></div>
      <div data-view="wiki" class="view"></div>
      <div data-view="diagrams" class="view" style="padding:0"></div>
      <div data-view="docs" class="view"></div>
      <div data-view="api" class="view"></div>
      <div data-view="admin" class="view"></div>
    </main>

  </div>

  <!-- ── Mobile bottom navigation ────────────────────────────────────── -->
  <nav class="bottom-nav" id="bottomNav" aria-label="Mobile navigation">
    <a class="bottom-nav-item" href="#overview" data-route-link="overview">
      <i class="ti ti-home" aria-hidden="true"></i>
      <span>Главная</span>
    </a>
    <a class="bottom-nav-item" href="#work-orders" data-route-link="work-orders">
      <i class="ti ti-clipboard-list" aria-hidden="true"></i>
      <span>Наряды</span>
      <span class="bottom-badge" id="mobile-badge-wo" style="display:none"></span>
    </a>
    <a class="bottom-nav-item" href="#inventory" data-route-link="inventory">
      <i class="ti ti-packages" aria-hidden="true"></i>
      <span>Склад</span>
      <span class="bottom-badge bottom-badge--warn" id="mobile-badge-inv" style="display:none"></span>
    </a>
    <a class="bottom-nav-item" href="#projects" data-route-link="projects">
      <i class="ti ti-briefcase" aria-hidden="true"></i>
      <span>Проекты</span>
    </a>
    <button class="bottom-nav-item bottom-nav-more" id="mobileMoreBtn" type="button" aria-label="Все разделы">
      <i class="ti ti-grid-dots" aria-hidden="true"></i>
      <span>Ещё</span>
    </button>
  </nav>

  <!-- ── Mobile "More" drawer ─────────────────────────────────────────── -->
  <div class="mobile-drawer-backdrop" id="mobileDrawerBackdrop"></div>
  <div class="mobile-drawer" id="mobileDrawer" aria-hidden="true">
    <div class="mobile-drawer-handle"></div>
    <div class="mobile-drawer-title">Все разделы</div>
    <div class="mobile-drawer-grid">
      <a class="mobile-drawer-item" href="#tech" data-route-link="tech" data-drawer-close>
        <span class="mobile-drawer-icon"><i class="ti ti-qrcode"></i></span>
        <span>Field / Scan</span>
      </a>
      <a class="mobile-drawer-item" href="#logs" data-route-link="logs" data-drawer-close>
        <span class="mobile-drawer-icon"><i class="ti ti-list-details"></i></span>
        <span>Журнал</span>
      </a>
      <a class="mobile-drawer-item" href="#wiki" data-route-link="wiki" data-drawer-close>
        <span class="mobile-drawer-icon"><i class="ti ti-notes"></i></span>
        <span>Wiki</span>
      </a>
      <a class="mobile-drawer-item" href="#diagrams" data-route-link="diagrams" data-drawer-close>
        <span class="mobile-drawer-icon"><i class="ti ti-vector-bezier"></i></span>
        <span>Схемы</span>
      </a>
      <a class="mobile-drawer-item" href="#docs" data-route-link="docs" data-drawer-close>
        <span class="mobile-drawer-icon"><i class="ti ti-book-2"></i></span>
        <span>Docs</span>
      </a>
      <a class="mobile-drawer-item" href="#api" data-route-link="api" data-drawer-close>
        <span class="mobile-drawer-icon"><i class="ti ti-activity"></i></span>
        <span>API Monitor</span>
      </a>
      <a class="mobile-drawer-item" href="#admin" data-route-link="admin" data-drawer-close>
        <span class="mobile-drawer-icon"><i class="ti ti-settings"></i></span>
        <span>Admin</span>
      </a>
    </div>
  </div>

</div>

<!-- Toast notifications -->
<div id="toast" class="toast" role="alert" aria-live="polite"></div>

<!-- Command palette placeholder (⌘K) -->
<div id="commandPalette" class="cmd-overlay" style="display:none" role="dialog" aria-modal="true" aria-label="Command search">
  <div class="cmd-box">
    <div class="cmd-search-row">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="cmdInput" placeholder="Search projects, tasks, inventory..." autocomplete="off" aria-label="Command search input">
      <kbd class="cmd-esc">Esc</kbd>
    </div>
    <div class="cmd-results" id="cmdResults"></div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
